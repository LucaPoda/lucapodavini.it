<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca Podavini - AI and Robotics</title>
    
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">    
    
    <link rel="alternate" hreflang="it" href="https://www.lucapodavini.it/" />
    <link rel="alternate" hreflang="en" href="https://www.lucapodavini.it/en/" />
    <link rel="alternate" hreflang="x-default" href="https://www.lucapodavini.it/en/" />

    <script>
        const savedLang = localStorage.getItem('preferredLang');
        const suffix = window.location.search + window.location.hash;

        // Se l'utente in passato ha scelto Italiano, rimandalo alla root portandosi dietro il suffisso
        if (savedLang === 'it') {
            window.location.replace('/' + suffix);
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen antialiased">
    
    <div id="app"></div>

    <script type="module">
        import { initApp } from '/main.js';
        initApp('en'); // Inizializza l'app in Inglese
    </script>
</body>
</html>
