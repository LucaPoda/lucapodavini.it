<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca Podavini - Robotica ed AI</title>
    
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

    <link rel="alternate" hreflang="it" href="https://www.lucapodavini.it/" />
    <link rel="alternate" hreflang="en" href="https://www.lucapodavini.it/en/" />
    <link rel="alternate" hreflang="x-default" href="https://www.lucapodavini.it/en/" />

    <script>
        const savedLang = localStorage.getItem('preferredLang');
        const browserLang = navigator.language || navigator.userLanguage;
        
        // Cattura ancore (#) e parametri (?) attuali
        const suffix = window.location.search + window.location.hash;

        // Se l'utente in passato ha scelto Inglese, rimandalo lì portandosi dietro il suffisso
        if (savedLang === 'en') {
            window.location.replace('/en/' + suffix);
        } 
        // Se è la primissima visita e il browser non è italiano, mandalo in Inglese col suffisso
        else if (!savedLang && !browserLang.startsWith('it')) {
            window.location.replace('/en/' + suffix); 
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen antialiased">
    <div id="app"></div>

    <script type="module">
        import { initApp } from '/main.js';
        initApp('it'); // Inizializza l'app in Italiano
    </script>
</body>
</html>
