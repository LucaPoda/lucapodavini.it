<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca Podavini - Links & Contatti</title>
    
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

    <link rel="alternate" hreflang="it" href="https://www.lucapodavini.it/links/" />
    <link rel="alternate" hreflang="en" href="https://www.lucapodavini.it/en/links/" />
    <link rel="alternate" hreflang="x-default" href="https://www.lucapodavini.it/en/links/" />

    <script>
        const savedLang = localStorage.getItem('preferredLang');
        const browserLang = navigator.language || navigator.userLanguage;
        
        const suffix = window.location.search + window.location.hash;

        // Redirect corretti verso /en/links/
        if (savedLang === 'en') {
            window.location.replace('/en/links/' + suffix);
        } else if (!savedLang && !browserLang.startsWith('it')) {
            window.location.replace('/en/links/' + suffix); 
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen antialiased bg-[#1a1e24]">
    <div id="app"></div>

    <script type="module">
        import { initLinks } from '/main.js';
        initLinks('it'); 
    </script>
</body>
</html>
